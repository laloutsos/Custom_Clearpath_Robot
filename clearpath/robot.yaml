serial_number: j100-0000
version: 0
system:
  hosts:
    - hostname: cpr-j100-0000
      ip: 192.168.131.1
  ros2:
    namespace: j100_0000
    workspaces:
      - "/home/colcon_ws/install/setup.bash"
platform:
  attachments:
    - name: front_fender
      type: j100.fender
    - name: rear_fender
      type: j100.fender
      rpy: [0.0, 0.0, 3.1415]
  mcu:
    protocol: proton
sensors:
  lidar3d:
  - model: velodyne_lidar
    urdf_enabled: true
    launch_enabled: true
    parent: base_link
    xyz: [-0.17, 0.0, 0.515]
    rpy: [0.0, 0.0, 0.0]
    ros_parameters:
      velodyne_driver_node:
        frame_id: lidar3d_0_laser
        device_ip: 192.168.131.25
        port: 2368
        model: VLP16
      velodyne_transform_node:
        model: VLP16
        fixed_frame: lidar3d_0_laser
        target_frame: lidar3d_0_laser
  camera:
  - model: intel_realsense
    urdf_enabled: true
    launch_enabled: true
    parent: arm_0_end_effector_link
    xyz: [-0.03, 0.0, 0.00]
    rpy: [0.0, -1.5, 0.0]
    ros_parameters:
      intel_realsense:
        camera_name: camera_0
        device_type: d435
        serial_no: "0"
        enable_color: true
        rgb_camera.color_profile: 640,480,30
        enable_depth: true
        depth_module.depth_profile: 640,480,15
        pointcloud.enable: true
  - model: flir_blackfly
    urdf_enabled: true
    launch_enabled: true
    parent: fath_pivot_0_mount
    #xyz: [0.2, 0.13, 0.25]
    xyz: [0.0, 0.0, 0.0]
    rpy: [0.0, 0.0, 0.0]
    ros_parameters:
      flir_blackfly:
        serial_number: ''
        gain_auto: Continuous
        pixel_format: BayerRG8
        # Resolution
        # image_width: 1408
        # image_height: 1080
        # offset_x: 0
        # offset_y: 0
        binning_x: 2
        binning_y: 2
        frame_rate_enable: true
        frame_rate_auto: Off
        frame_rate: 30
  gps:
  - model: swiftnav_duro
    urdf_enabled: true
    launch_enabled: true
    parent: base_link
    xyz: [-0.28, -0.1, 0.515]
    rpy: [0.0, 0.0, 0.0]
    ros_parameters:
      duro_node:
        gps_receiver_frame_id: gps_0_link
        ip_address: 192.168.131.30
        ip_port: 55555
        imu_frame_id: gps_0_link

manipulators:
  moveit:
    enable: true
  arms:
    - model: kinova_gen3_lite
      parent: default_mount
      xyz: [0.12, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      ip: 192.168.131.40
      port: 10000
      gripper:
        model: kinova_2f_lite
links:
  mesh:
    - name: mesh_name
      parent: base_link
      xyz: [0.0, 0.0, 0.18]
      rpy: [0.0, 0.0, 0.0]
      visual:
        path: /home/robolab/clearpath_ws/src/clearpath_common/clearpath_mounts_description/meshes/best.stl

    # Still under development
    #- name: realsense_grip
      #parent: arm_0_end_effector_link
      #xyz: [0.23, 0.0, 0.2]
      #rpy: [0.0, 0.5, 0.0]
      #visual:
        #path: /home/nickl/clearpath_ws/src/clearpath_common/clearpath_mounts_description/meshes/realsense_grip.stl


mounts:
  fath_pivot:
    - parent: base_link
      xyz: [0.23, 0.13, 0.17]
      rpy: [0.0, 0.7, 0.0]
      angle: -0.3 # in radian

